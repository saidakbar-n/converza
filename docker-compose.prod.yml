services:
  hermes:
    build:
      context: .
      dockerfile: deploy/hermes/Dockerfile
    env_file: /etc/converza/.env
    network_mode: host
    restart: unless-stopped
    volumes:
      - hermes_data:/opt/hermes
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8642/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

  bot:
    build:
      context: .
      dockerfile: converza_bot/Dockerfile
    env_file: /etc/converza/.env
    network_mode: host
    restart: unless-stopped
    depends_on:
      hermes:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: converza_web/Converza_ai/Dockerfile
    env_file: /etc/converza/.env
    network_mode: host
    environment:
      BOT_INTERNAL_URL: http://127.0.0.1:8000
      HERMES_URL: http://127.0.0.1:8642
    restart: unless-stopped
    depends_on:
      hermes:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

volumes:
  hermes_data:
