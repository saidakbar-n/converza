services:
  bot:
    build: ./converza_bot
    env_file: /etc/converza/.env
    network_mode: host
    restart: unless-stopped

  web:
    build: ./converza_web/Converza_ai
    environment:
      BOT_INTERNAL_URL: http://127.0.0.1:8000
    env_file: /etc/converza/.env
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      - bot
    restart: unless-stopped
