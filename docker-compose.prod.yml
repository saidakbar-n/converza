services:
  bot:
    build: ./converza_bot
    env_file: /etc/converza/.env
    network_mode: host
    restart: unless-stopped

    web:
    environment:
      BOT_INTERNAL_URL: http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      - bot
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
