name = "anti-patterns"
description = "Use when adding, modifying, or debugging an anti-pattern detection rule in this repo. Walks through the TDD recipe, the rule schema, all five plug-in points, jsdom constraints, the cross-validation step against the impeccable skill, and the post-implementation checklist. Trigger this for any work touching src/detect-antipatterns.mjs, tests/fixtures/antipatterns/, or extension/detector/."
developer_instructions = """
# Anti-Pattern Engine Maintenance\r
\r
This agent handles every step of adding or modifying an anti-pattern detection rule in the impeccable repo. The rule engine is wired into many places and a single source-of-truth design ties them together. Skip any step at your peril — the build's cross-validator will fail loudly if drift slips in.\r
\r
## The five things that need to stay in sync\r
\r
When you add a rule, all of these update or get regenerated:\r
\r
| Where | What | How it stays in sync |\r
|---|---|---|\r
| `src/detect-antipatterns.mjs` `ANTIPATTERNS` | Rule metadata (id, category, name, description, skillSection, skillGuideline) and the detection logic (`checkXxx`) | **Hand-edited.** Source of truth. |\r
| `src/detect-antipatterns-browser.js` | Browser-bundled engine for the public site overlay | Generated by `bun run build:browser` |\r
| `extension/detector/detect.js` | Browser-bundled engine for the Chrome extension | Generated by `bun run build:extension` |\r
| `extension/detector/antipatterns.json` | Rule list (id, name, category, description) for the extension's devtools panel — drives rule toggles UI | Generated by `bun run build:extension` |\r
| `public/js/generated/counts.js` | `DETECTION_COUNT` integer for homepage display | Generated by `bun run build` |\r
| `source/skills/impeccable/SKILL.md` | Per-rule **DON'T** line in the right `### Section` — taught to users via the impeccable skill | **Hand-edited.** Validator catches drift. |\r
\r
The CLI (`bin/cli.js`) imports `ANTIPATTERNS` directly from `src/detect-antipatterns.mjs` — no separate sync needed.\r
\r
## Rule schema\r
\r
Each entry in the `ANTIPATTERNS` array (around src/detect-antipatterns.mjs:77) looks like this:\r
\r
```js\r
{\r
  id: 'icon-tile-stack',                          // kebab-case, unique, stable\r
  category: 'slop',                                // 'slop' or 'quality' (see below)\r
  name: 'Icon tile stacked above heading',        // human-readable, used in extension UI\r
  description:                                     // 1–2 sentences. Used in CLI output, extension tooltips, web overlay labels\r
    'A small rounded-square icon container above a heading is the universal AI feature-card template — every generator outputs this exact shape. Try a side-by-side icon and heading, or let the icon sit in flow without its own container.',\r
  skillSection: 'Typography',                      // OPTIONAL but strongly recommended. Must be one of the parser's allowed sections (see below)\r
  skillGuideline: 'large icons with rounded corners above every heading',  // OPTIONAL but strongly recommended. Substring that must appear in some **DON'T**: line of the named section in source/skills/impeccable/SKILL.md\r
}\r
```\r
\r
### Categories\r
\r
- **`slop`** = "AI tells". Patterns that scream *AI generated this*. Things like purple gradients, gradient text, dark glow accents, thick side borders, icon-tile-stacks. Flagging these is about taste and freshness, not correctness.\r
- **`quality`** = real design or accessibility issues regardless of who wrote the code. WCAG contrast, line length, padding, line height, justified text, skipped headings, etc.\r
\r
If you're not sure, ask: *"would a human designer who's careful and tasteful still ship this?"* If no, it's `quality`. If they would (because it works fine, it just looks templated), it's `slop`.\r
\r
### `skillSection` allowed values\r
\r
These are the section names the `readPatterns()` parser at scripts/lib/utils.js:221 understands. Use **exactly** these strings (note the parser normalizes `Color & Theme` → `Color & Contrast`):\r
\r
```\r
Typography\r
Color & Contrast\r
Layout & Space\r
Visual Details\r
Motion\r
Interaction\r
Responsive\r
UX Writing\r
```\r
\r
### `skillGuideline` substring\r
\r
A 3–6 word substring that appears verbatim in some `**DON'T**:` line of the named section in `source/skills/impeccable/SKILL.md`. The build validator checks this with `String.includes()`. Pick a substring that's:\r
\r
- Short enough that benign rewordings of the DON'T won't break it\r
- Specific enough that it can't accidentally collide with an unrelated DON'T\r
\r
Examples: `'AI color palette'`, `'large icons with rounded corners above every heading'`, `'WCAG AA contrast'`.\r
\r
If a rule genuinely doesn't deserve a skill DON'T (rare — only the most niche a11y-only rules), omit both `skillSection` and `skillGuideline`. The validator skips rules without `skillGuideline`.\r
\r
## The TDD recipe (always do it in this order)\r
\r
This order is non-negotiable. Fixture and failing test before implementation. The full suite must run between the rule going in and you committing.\r
\r
### 1. Write the fixture (two-column convention)\r
\r
A single HTML file at `tests/fixtures/antipatterns/{rule-id}.html` with two columns: left = should-flag, right = should-pass. Each test case carries a unique heading text so the test can match snippets back to expectations.\r
\r
Convention skeleton:\r
\r
```html\r
<!DOCTYPE html>\r
<html>\r
<head>\r
  <style>\r
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; max-width: 960px; margin: 0 auto; padding: 24px; }\r
    .col h2 { font-size: 14px; text-transform: uppercase; }\r
    /* ... per-case styles with EXPLICIT pixel dimensions (jsdom can't lay out) ... */\r
  </style>\r
</head>\r
<body>\r
  <div class="grid">\r
    <div class="col" data-col="flag">\r
      <h2>Should flag</h2>\r
      <!-- 4–6 cases that should be flagged, each with a unique <h3> text -->\r
    </div>\r
    <div class="col" data-col="pass">\r
      <h2>Should pass</h2>\r
      <!-- 5–8 cases that should NOT be flagged: cover every false-positive shape you can think of -->\r
    </div>\r
  </div>\r
  <script src="/js/detect-antipatterns-browser.js"></script>\r
</body>\r
</html>\r
```\r
\r
The script tag at the bottom is critical — it lets you load the fixture in the browser via `http://localhost:3000/fixtures/antipatterns/{rule-id}.html` (served by `server/index.js:62` route for `/fixtures/*`).\r
\r
**Should-pass cases must cover the false-positive shapes you can think of in advance.** A good fixture has 5+ pass cases. The icon-tile-stack fixture covers: round avatar, wide thumbnail, side-by-side, no-icon, too-tiny, too-huge.\r
\r
### 2. Write the failing test\r
\r
Add to `tests/detect-antipatterns-fixtures.test.mjs` in its own `describe` block. Use the snippet-substring matching pattern — the test parses heading text out of each finding's snippet and asserts membership against expected lists:\r
\r
```js\r
describe('detectHtml — {rule-id}', () => {\r
  const SHOULD_FLAG = ['Heading One', 'Heading Two', /* ... */];\r
  const SHOULD_PASS = ['Pass Heading One', /* ... */];\r
\r
  it('{rule-id}: flags only the should-flag column', async () => {\r
    const f = await detectHtml(path.join(FIXTURES, '{rule-id}.html'));\r
    const flagged = new Set();\r
    for (const r of f) {\r
      if (r.antipattern !== '{rule-id}') continue;\r
      const m = (r.snippet || '').match(/"([^"]+)"/);\r
      if (m) flagged.add(m[1]);\r
    }\r
    for (const text of SHOULD_FLAG) {\r
      assert.ok(flagged.has(text), `expected "${text}" to be flagged`);\r
    }\r
    for (const text of SHOULD_PASS) {\r
      assert.ok(!flagged.has(text), `"${text}" should NOT be flagged`);\r
    }\r
  });\r
});\r
```\r
\r
For this to work, the rule's snippet **must include the heading text in quotes**. See "Snippet conventions" below.\r
\r
Run `node --test tests/detect-antipatterns-fixtures.test.mjs` and **watch it fail**. If it doesn't fail, your test is wrong.\r
\r
### 3. Add the rule definition\r
\r
Add a new entry to the `ANTIPATTERNS` array in `src/detect-antipatterns.mjs`. Place it in the right category section (slop or quality). Fill in all fields including `skillSection` and `skillGuideline`.\r
\r
### 4. Implement the pure check function\r
\r
Add a `checkXxx(opts)` function alongside the others (`checkColors`, `checkBorders`, `checkMotion`, `checkGlow`, `checkIconTile`, etc.). The pure function takes a plain options object — no DOM access — and returns an array of `{ id, snippet }`. This makes it testable and reusable across the browser/Node adapters.\r
\r
Example shape (see `checkIconTile` in src/detect-antipatterns.mjs for a real one):\r
\r
```js\r
function checkXxx(opts) {\r
  const { tag, /* whatever fields the rule needs */ } = opts;\r
  if (SAFE_TAGS.has(tag)) return [];\r
  // ... your detection logic ...\r
  if (matches) {\r
    return [{ id: 'rule-id', snippet: `... "${headingText}"` }];\r
  }\r
  return [];\r
}\r
```\r
\r
### 5. Add the two adapters\r
\r
Two adapters wrap the pure function with environment-specific input gathering:\r
\r
- **`checkElementXxxDOM(el)`** — for the browser. Uses `getComputedStyle(el)` and `el.getBoundingClientRect()`.\r
- **`checkElementXxx(el, tag, window)`** — for jsdom (Node). Uses `window.getComputedStyle(el)` and **must read explicit pixel dimensions from `parseFloat(style.width)`** instead of bounding rects, because **jsdom does not lay out** — `getBoundingClientRect()` returns 0×0 for everything.\r
\r
If your rule needs vertical positioning info (e.g. "icon must be above heading"), that check is browser-only — gate it behind `if (headingTop && siblingBottom)` so the Node path skips it. The structural checks alone (sizes, sibling identity, classes) are enough for the fixture.\r
\r
### 6. Wire into both element-iteration loops\r
\r
Two loops iterate every element on the page. You need to add your DOM-adapter call to **both**:\r
\r
- **Browser loop** at src/detect-antipatterns.mjs:1837 (`for (const el of document.querySelectorAll('*'))` with the `findings` spread). Add a line like:\r
  ```js\r
  ...checkElementXxxDOM(el).map(f => ({ type: f.id, detail: f.snippet })),\r
  ```\r
- **Node (jsdom) loop** at src/detect-antipatterns.mjs:2058 (in `detectHtml`). Add a block like:\r
  ```js\r
  for (const f of checkElementXxx(el, tag, window)) {\r
    findings.push(finding(f.id, filePath, f.snippet));\r
  }\r
  ```\r
\r
Forgetting one of these is the most common mistake — the test passes but the live page doesn't show anything (or vice versa).\r
\r
### 7. Add the SKILL.md DON'T line if the rule doesn't reuse an existing one\r
\r
Open `source/skills/impeccable/SKILL.md`, find the right `### Section`, and add a **DON'T** line that contains your `skillGuideline` substring verbatim. Match the style of existing DON'Ts (terse, prescriptive, 1–2 sentences max).\r
\r
If your rule reuses an existing DON'T (e.g. multiple engine rules can map to the same skill guidance, like `side-tab` and `border-accent-on-rounded` both pointing to `'thick colored border on one side'`), no skill edit is needed.\r
\r
### 8. Run the build (this regenerates everything and validates)\r
\r
```bash\r
bun run build && bun run build:browser && bun run build:extension\r
```\r
\r
This regenerates:\r
- `src/detect-antipatterns-browser.js` (public-site detector)\r
- `extension/detector/detect.js` (extension detector)\r
- `extension/detector/antipatterns.json` (extension rule list, includes description)\r
- `public/js/generated/counts.js` (DETECTION_COUNT)\r
\r
And validates:\r
- Cross-checks every rule with `skillGuideline` against `source/skills/impeccable/SKILL.md` via `validateAntipatternRules()` in scripts/build.js. **Build fails if drift exists.**\r
\r
### 9. Run the test suite\r
\r
```bash\r
bun run test\r
```\r
\r
166 unit tests + N fixture tests, including your new one. All should be green.\r
\r
### 10. Verify on a live page in the browser\r
\r
Don't skip this. The jsdom path uses `parseFloat(style.width)` and the browser path uses `getBoundingClientRect()` — they can disagree. The fixture test catches one path; manual browser verification catches the other.\r
\r
```\r
http://localhost:3000/fixtures/antipatterns/{rule-id}.html\r
http://localhost:3000/antipattern-examples/{your-example}.html  (if relevant)\r
http://localhost:3000/                                           (no false positives on real pages)\r
```\r
\r
Use the chrome MCP tools (`mcp__claude-in-chrome__navigate` + `mcp__claude-in-chrome__javascript_tool`) to inject `window.impeccableScan()` and read `.impeccable-overlay` / `.impeccable-label` from the DOM to verify. Don't try to screenshot — the overlays are decorative; read them programmatically.\r
\r
## Snippet conventions\r
\r
The fixture-test convention extracts the heading text from a finding's snippet using regex `/"([^"]+)"/` — so **wrap the identifying heading text in straight double quotes** in your snippet. Examples:\r
\r
- `'80x80px icon tile above h3 "Lightning Fast"'`\r
- `'4.5:1 (need 4.5:1) — text #808080 on #3b82f6'`  ← uses element identifiers instead, since this rule isn't anchored to a heading\r
\r
If your rule isn't naturally anchored to a heading, pick another stable identifier (a class name, the parent element's text, etc.) and document the test pattern in the test itself.\r
\r
## jsdom constraints (the most common gotcha)\r
\r
- **No layout.** `getBoundingClientRect()` returns `0×0` always. Read `parseFloat(style.width)` and `parseFloat(style.height)` instead — jsdom does honor explicit pixel widths in `<style>` and inline styles.\r
- **`background:` shorthand isn't decomposed.** `style.backgroundColor` and `style.backgroundImage` may be empty even when `style="background: ..."` is set. The existing `resolveBackground()` and `resolveGradientStops()` helpers (src/detect-antipatterns.mjs:631 and src/detect-antipatterns.mjs:670) handle this — use them.\r
- **Computed colors are normalized in real browsers, not in jsdom.** A browser returns `rgb(59, 130, 246)`; jsdom may return the original hex. The `parseGradientColors()` helper handles both.\r
- **No SAFE_TAGS skipping for parent walks.** When walking ancestors, you don't get the `SAFE_TAGS` filter the main loop applies — be explicit.\r
\r
## Where to find concrete example rules to learn from\r
\r
- Simplest border check: **`side-tab`** — `checkBorders()` at src/detect-antipatterns.mjs:312\r
- Color/contrast with gradient handling: **`low-contrast`** — `checkColors()` at src/detect-antipatterns.mjs:339\r
- Element-relationship check (siblings): **`icon-tile-stack`** — `checkIconTile()` at src/detect-antipatterns.mjs:425\r
- Page-level / cross-element: **`flat-type-hierarchy`** — `checkPageTypography()` at src/detect-antipatterns.mjs:1080\r
- Motion/animation: **`bounce-easing`** — `checkMotion()` at src/detect-antipatterns.mjs:425\r
\r
## Pre-commit checklist\r
\r
Before you commit a new rule, all of these MUST be true. The first three are non-negotiable — if any is missing, the engine, extension, public site, and skill will silently drift apart.\r
\r
- [ ] Test passes: `bun run test` is green\r
- [ ] Build passes: `bun run build && bun run build:browser && bun run build:extension` is green (validator says `✓ Validated N/N anti-pattern rules`)\r
- [ ] Live verification: rule fires on a real page and produces zero false positives on the homepage `http://localhost:3000/`\r
- [ ] Both element loops were updated (browser DOM at line ~1846 + Node jsdom at line ~2058)\r
- [ ] Rule has a corresponding SKILL.md DON'T (or explicitly omitted `skillGuideline`)\r
- [ ] Snippet format matches the test's extraction regex\r
- [ ] Fixture covers ≥4 should-flag and ≥5 should-pass cases\r
- [ ] Commit only the relevant files — `git status` will show many unrelated stale skill builds; do not stage them\r
\r
## Things that have bitten previous sessions\r
\r
- **Forgot to run `bun run build:extension`** — extension JSON went stale, missing the new rule. Symptom: extension panel doesn't show toggle for new rule. Fix: always run all three build commands.\r
- **Forgot to update both loops** — test passed in jsdom but live browser was silent (or vice versa). Fix: grep for an existing rule's adapter call and copy its placement.\r
- **Used a `skillGuideline` substring that doesn't appear in SKILL.md** — validator fails. Fix: the substring must appear verbatim in some `**DON'T**:` line of the named section.\r
- **Used the wrong `skillSection` name** — `Color & Theme` vs `Color & Contrast` (parser normalizes the former to the latter, so use `Color & Contrast`).\r
- **Wrote the fixture without explicit pixel dimensions** — jsdom returned 0×0 and the rule never matched. Fix: always set `width: Npx; height: Npx` in CSS for fixture elements, or use inline style attributes."""
