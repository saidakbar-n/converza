# Local PostgreSQL + PostgREST — same REST API shape as Supabase cloud.
# Start: ./scripts/local-db.sh start
# Point apps at .env.local (see .env.local.example).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: converza
    ports:
      - "5433:5432"   # 5433 avoids conflict with a system Postgres on 5432
    volumes:
      - converza_pgdata:/var/lib/postgresql/data
      - ./docker/local/01-roles.sql:/docker-entrypoint-initdb.d/01-roles.sql:ro
      - ./docker/local/02-schema.sh:/docker-entrypoint-initdb.d/02-schema.sh:ro
      - ./supabase/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d converza"]
      interval: 3s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.3
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:converza@db:5432/converza
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
    expose:
      - "3000"

  api:
    image: nginx:alpine
    depends_on:
      - postgrest
    ports:
      - "54321:80"
    volumes:
      - ./docker/local/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  converza_pgdata:
