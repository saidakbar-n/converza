server {
    listen 80;

    # Supabase Python client calls {SUPABASE_URL}/rest/v1/...
    location /rest/v1/ {
        proxy_pass http://postgrest:3000/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }

    # Health check for scripts/local-db.sh
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
